version: '3'

services:
  nextjs:
    build: .
    volumes:
      - ./src/app:/app
      - /app/node_modules
    ports:
     - "3000:3000"
    command: npm run dev
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/mydb
    depends_on:
      - db
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
     - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

