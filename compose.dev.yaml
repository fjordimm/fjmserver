services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/fjmdb_dev
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fjmdb_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: